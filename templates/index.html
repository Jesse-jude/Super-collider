<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Supercollider Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        background: #02060c; 
        color: #7af0ff; 
        font-family: 'Share Tech Mono', monospace; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        padding: 20px;
    }
    .shell { 
        width: 100%; 
        max-width: 1100px; 
        background: #050a12; 
        border: 1px solid #0f2a3f; 
        border-radius: 8px; 
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
    }
    .top-bar { 
        background: #0a192f; 
        padding: 10px 20px; 
        display: flex; 
        align-items: center; 
        border-bottom: 1px solid #0f2a3f; 
    }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 2px; color: #00d4ff; }
    .status { margin-left: auto; font-size: 10px; color: #4a8fa0; }

    .main-grid { display: grid; grid-template-columns: 260px 1fr 260px; min-height: 600px; }
    .panel { padding: 15px; border-right: 1px solid #0f2a3f; display: flex; flex-direction: column; gap: 15px; }
    .right-panel { border-right: none; border-left: 1px solid #0f2a3f; }

    /* Controls */
    .card { background: #071a2e; border: 1px solid #14375a; padding: 12px; border-radius: 4px; }
    .label { font-size: 10px; color: #4a8fa0; margin-bottom: 5px; display: block; }
    select, input[type=range] { width: 100%; margin-top: 5px; background: #02060c; color: #00d4ff; border: 1px solid #0f2a3f; padding: 5px; }

    /* The Button */
    .collide-btn { 
        background: linear-gradient(180deg, #005a9e 0%, #003a6e 100%);
        border: 1px solid #00d4ff; 
        color: #fff; 
        font-family: 'Orbitron', sans-serif; 
        padding: 15px; 
        cursor: pointer; 
        font-weight: bold;
        letter-spacing: 2px;
        transition: 0.2s;
        margin-top: auto;
    }
    .collide-btn:hover { background: #007ace; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
    .collide-btn:active { transform: scale(0.98); }

    /* Canvas */
    .viewport { position: relative; background: #010409; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    canvas { width: 100%; height: 100%; }

    /* Stats */
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: #0a192f; padding: 10px; border: 1px solid #0f2a3f; text-align: center; }
    .stat-val { font-size: 18px; color: #00ff88; font-family: 'Orbitron'; display: block; }
    .stat-lab { font-size: 9px; color: #4a8fa0; }

    .log { height: 120px; background: #02060c; border: 1px solid #0f2a3f; padding: 10px; font-size: 10px; overflow-y: auto; color: #2a7a9a; }
</style>
</head>
<body>

<div class="shell">
    <div class="top-bar">
        <div class="logo">S-COLLIDER v2.4</div>
        <div class="status" id="status">SYS_READY</div>
    </div>
    
    <div class="main-grid">
        <div class="panel">
            <div class="card">
                <span class="label">BEAM A PARTICLE</span>
                <select id="pA">
                    <option value="proton">Proton (p+)</option>
                    <option value="electron">Electron (e-)</option>
                </select>
                <span class="label" style="margin-top:10px">ENERGY (TeV)</span>
                <input type="range" id="eA" min="1" max="14" value="7">
            </div>

            <div class="card">
                <span class="label">BEAM B PARTICLE</span>
                <select id="pB">
                    <option value="antiproton">Antiproton (p-)</option>
                    <option value="positron">Positron (e+)</option>
                </select>
                <span class="label" style="margin-top:10px">ENERGY (TeV)</span>
                <input type="range" id="eB" min="1" max="14" value="7">
            </div>

            <button class="collide-btn" onclick="startCollision()">⚡ COLLIDE</button>
        </div>

        <div class="viewport">
            <canvas id="cvs"></canvas>
        </div>

        <div class="panel right-panel">
            <div class="stat-row">
                <div class="stat-box"><span class="stat-val" id="evCount">0</span><span class="stat-lab">EVENTS</span></div>
                <div class="stat-box"><span class="stat-val" id="lumi">0.0</span><span class="stat-lab">LUMI</span></div>
            </div>
            <div class="log" id="log">> Initializing injectors...<br>> Magnet alignment OK.</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('cvs');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animating = false;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startCollision() {
        if(animating) return;
        animating = true;
        document.getElementById('status').textContent = "COLLIDING...";
        particles = [];
        
        // Generate collision fragments
        const count = 20 + Math.random() * 30;
        for(let i=0; i<count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 5;
            particles.push({
                x: canvas.width/2,
                y: canvas.height/2,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1.0,
                color: `hsl(${180 + Math.random() * 60}, 100%, 70%)`
            });
        }
        
        updateStats();
        animate();
    }

    function updateStats() {
        const ev = document.getElementById('evCount');
        ev.textContent = parseInt(ev.textContent) + 1;
        const log = document.getElementById('log');
        log.innerHTML += `<br>> Event detected: ${particles.length} tracks.`;
        log.scrollTop = log.scrollHeight;
    }

    function animate() {
        ctx.fillStyle = 'rgba(2, 6, 12, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let alive = false;
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.015;
            
            if(p.life > 0) {
                alive = true;
                ctx.beginPath();
                ctx.strokeStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.lineWidth = 2;
                ctx.moveTo(p.x - p.vx, p.y - p.vy);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            }
        });

        if(alive) {
            requestAnimationFrame(animate);
        } else {
            animating = false;
            document.getElementById('status').textContent = "SYS_READY";
        }
    }

    // Initial background draw
    ctx.fillStyle = '#02060c';
    ctx.fillRect(0,0,canvas.width, canvas.height);
</script>
</body>
</html>
